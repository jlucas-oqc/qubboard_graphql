name: PR Coverage

on:
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # ── Run tests on the PR branch ─────────────────────────────────────────────
  test-pr:
    name: Tests – PR branch
    uses: ./.github/workflows/reusable-test.yml
    with:
      python-version: "3.12"

    steps:
      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: reports/junit.xml
          check_name: Test Results (PR branch)
          comment_title: Test Results (PR branch)
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload coverage report to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: reports/coverage.xml
          flags: pr-branch
          name: Coverage Report (PR branch)
          fail_ci_if_error: true

  # ── Run tests on the base branch ───────────────────────────────────────────
  test-base:
    name: Tests – base branch
    uses: ./.github/workflows/reusable-test.yml
    with:
      python-version: "3.12"

    steps:
      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: reports/junit.xml
          check_name: Test Results (Base branch)
          comment_title: Test Results (Base branch)
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload coverage report to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: reports/coverage.xml
          flags: base-branch
          name: Coverage Report (Base branch)
          fail_ci_if_error: true

  # ── Post coverage delta comment on the PR ──────────────────────────────────
  coverage-comment:
    name: Post coverage delta comment
    runs-on: ubuntu-latest
    needs: [test-pr, test-base]

    steps:
      - name: Post coverage delta
        uses: codecov/codecov-action@v3
        with:
          flags: pr-branch,base-branch
          github_token: ${{ secrets.GITHUB_TOKEN }}
          fail_ci_if_error: true
