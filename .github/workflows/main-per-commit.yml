name: Main Per-Commit Actions

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: snok/install-poetry@v1
        with:
          virtualenvs-in-project: true
      - uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-py${{ matrix.python-version }}-
      - name: Install dependencies
        run: poetry install --with dev
      - name: Run tests with coverage
        run: |
          poetry run pytest \
            --tb=short \
            --junitxml=reports/junit-${{ matrix.python-version }}.xml \
            --cov=src/qupboard_graphql \
            --cov-report=xml:reports/coverage-${{ matrix.python-version }}.xml \
            --cov-report=term-missing
      - name: Upload test reports (junit + coverage)
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.python-version }}
          path: |
            reports/junit-${{ matrix.python-version }}.xml
            reports/coverage-${{ matrix.python-version }}.xml
        if: always()

  build-badges:
    name: Generate and publish badges
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-in-project: true
      - name: Install dependencies
        run: poetry install --with dev
      - name: Download test reports (3.12) into reports/
        uses: actions/download-artifact@v4
        with:
          name: test-reports-3.12
          path: reports
      - name: Show reports directory
        run: |
          echo "Listing reports/ and top-level files:"
          ls -la reports || true
          ls -la || true
      - name: Generate badges
        run: |
          mkdir -p reports/badges
          poetry run genbadge tests \
            -i reports/junit-3.12.xml \
            -o reports/badges/tests.svg
          poetry run genbadge coverage \
            -i reports/coverage-3.12.xml \
            -o reports/badges/coverage.svg
        if: always()
      - name: Publish badges to the gh-pages branch
        run: |
          mkdir -p gh-pages/badges
          # copy any generated badges (if none exist, skip)
          shopt -s nullglob
          copied=0
          for f in reports/badges/*.svg; do
            cp "$f" gh-pages/badges/ && copied=1 || true
          done
          if [ "$copied" -eq 0 ]; then
            echo "No badges to publish; skipping commit."
            exit 0
          fi
          cd gh-pages
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add badges/
          if git diff --cached --quiet; then
            echo "No badge changes to commit."
          else
            git commit -m "chore: update CI badges [skip ci]"
            git push origin gh-pages
          fi
